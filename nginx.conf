# X-Robots-Tag varia por caminho. Usar "map" em vez de "if" dentro do
# location — descobri nesta sessão que um "if" com add_header dentro de um
# location que já tem outros add_header faz o nginx descartar TODOS os
# add_header do nível pai pra requisições que casam a condição (comportamento
# real, documentado, não bug de digitação). "map" no nível http evita isso
# por completo: o valor varia, mas o add_header em si nunca fica condicional.
map $request_uri $robots_tag_value {
    ~^/portal  "noindex, nofollow";
    default    "";
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # Headers de segurança
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-r4i5PERpQzSj+JzuLsda4zfQiIt+CExCVVs7li1EHVs=' 'sha256-qVNMNRTFa1awIUmy7MQpYiWyZXWkiOf4cdmo+b5Dtxg=' https://www.googletagmanager.com https://*.clarity.ms; style-src 'self' 'unsafe-inline' https://fonts.bunny.net; img-src 'self' data: blob: https://educarepedagogia.com.br https://www.google-analytics.com https://www.googletagmanager.com https://*.clarity.ms https://c.bing.com; connect-src 'self' https://educarepedagogia.com.br https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://*.clarity.ms https://materialgratis.educarepedagogia.com.br; frame-src https://educarepedagogia.com.br; font-src 'self' data: https://fonts.bunny.net; object-src 'none'; worker-src 'self' blob:; form-action 'self'; base-uri 'self'; frame-ancestors 'self'; upgrade-insecure-requests;" always;

    # SPA routing — React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo para assets com hash de build (JS, CSS, fontes)
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache médio para imagens e ícones
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # HTML nunca em cache (garantia de always-fresh para o index.html do SPA)
    # Nginx não herda add_header do bloco pai — headers de segurança precisam ser repetidos aqui
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-r4i5PERpQzSj+JzuLsda4zfQiIt+CExCVVs7li1EHVs=' 'sha256-qVNMNRTFa1awIUmy7MQpYiWyZXWkiOf4cdmo+b5Dtxg=' https://www.googletagmanager.com https://*.clarity.ms; style-src 'self' 'unsafe-inline' https://fonts.bunny.net; img-src 'self' data: blob: https://educarepedagogia.com.br https://www.google-analytics.com https://www.googletagmanager.com https://*.clarity.ms https://c.bing.com; connect-src 'self' https://educarepedagogia.com.br https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://*.clarity.ms https://materialgratis.educarepedagogia.com.br; frame-src https://educarepedagogia.com.br; font-src 'self' data: https://fonts.bunny.net; object-src 'none'; worker-src 'self' blob:; form-action 'self'; base-uri 'self'; frame-ancestors 'self'; upgrade-insecure-requests;" always;

        # Área restrita aos compradores (sem login nesta fase, link recebido
        # por e-mail) — robots.txt só pede, não garante. $robots_tag_value
        # (mapeado no topo do arquivo) já resolve por $request_uri, então
        # sobrevive ao try_files redirecionar internamente pra index.html,
        # que é o que toda rota /portal/* faz — sem precisar de "if" aqui.
        add_header X-Robots-Tag $robots_tag_value always;
    }

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
